<!DOCTYPE html>
<html>
<head>
  <title>Order Viewer</title>
  <style>
    ul { list-style-type: none; padding-left: 1em; }
    li { margin: 2px 0; }
    .key { font-weight: bold; }
    .value { color: #007700; }
  </style>
</head>
<body>
  <h1>Order Viewer</h1>
  <input type="text" id="order_id" placeholder="Enter Order UID" />
  <button onclick="fetchOrder()">Fetch</button>
  <div id="result"></div>
  <script>
    function fetchOrder() {
      const id = document.getElementById('order_id').value;
      fetch('http://localhost:8080/order/' + id)
        .then(res => {
          if (!res.ok) {
            return res.text().then(text => {
              throw new Error(`Server error ${res.status}: ${text}`);
            });
          }
          return res.json();
        })
        .then(data => {
          document.getElementById('result').innerHTML = renderJSON(data);
        })
        .catch(err => {
          alert("Error: " + err.message);
          document.getElementById('result').innerText = err.message;
        });
    }

    function renderJSON(obj) {
      if (typeof obj !== 'object' || obj === null) {
        return `<span class="value">${JSON.stringify(obj)}</span>`;
      }
      let html = '<ul>';
      for (const key in obj) {
        html += `<li><span class="key">${key}:</span> `;
        html += renderJSON(obj[key]);
        html += '</li>';
      }
      html += '</ul>';
      return html;
    }
  </script>
</body>
</html>
